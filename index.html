<!doctype html>
<html lang="en">
	<head>
		<script>
			const saved = localStorage.theme;
			const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
			const theme = saved ?? (prefersDark ? 'dark' : 'light');

			if (theme === 'dark') {
				document.documentElement.classList.add('dark');
			} else {
				document.documentElement.classList.remove('dark');
			}
		</script>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:wght@400&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
			onload="this.onload=null;this.rel='stylesheet'"
		/>
		<noscript>
			<link
				rel="stylesheet"
				href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:wght@400&family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
			/>
		</noscript>
		<link
			rel="preload"
			as="image"
			href="/images/optimized/river-960.jpg"
			imagesrcset="/images/optimized/river-420.jpg 420w, /images/optimized/river-680.jpg 680w, /images/optimized/river-960.jpg 960w"
			imagesizes="(max-width: 672px) calc(100vw - 2rem), 640px"
			fetchpriority="high"
		/>
		<meta
			name="description"
			content="Jenny Le's portfolio showcasing web dev projects, product-focused interfaces, and creative technical work."
		/>
		<title>jenny's corner</title>
	</head>
	<body>
		<div
			id="root"
			class="bg-white text-zinc-700 dark:bg-zinc-800 dark:text-gray-200 min-h-screen py-2"
		></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
